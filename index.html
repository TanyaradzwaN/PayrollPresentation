                                        <span class="w-2.5 h-2.5 rounded-full bg-brand-500"></span>
                                        <span class="text-[10px] font-mono uppercase text-slate-400 font-bold">Employee Mobile Chat Portal</span>
                                    </div>
                                    <span class="text-[10px] text-slate-500">Self-Service</span>
                                </div>

                                <!-- Mini Chat Mockup -->
                                <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 space-y-3 flex-grow my-2">
                                    <div class="flex flex-col gap-1 items-start max-w-[85%]">
                                        <span class="text-[9px] text-slate-500 ml-1">CorePay AI Agent</span>
                                        <div class="bg-slate-900 p-2.5 rounded-lg text-[11px] text-slate-300">
                                            Hello Sarah. How can I help with your payslip today?
                                        </div>
                                    </div>
                                    <div class="flex flex-col gap-1 items-end max-w-[85%] ml-auto">
                                        <span class="text-[9px] text-slate-500 mr-1 font-bold">Sarah Doe (Employee)</span>
                                        <div class="bg-brand-500 p-2.5 rounded-lg text-[11px] text-slate-950 font-medium">
                                            Why is my take-home pay higher this month?
                                        </div>
                                    </div>
                                    <div class="flex flex-col gap-1 items-start max-w-[85%]">
                                        <span class="text-[9px] text-slate-500 ml-1">CorePay AI Agent</span>
                                        <div class="bg-slate-900 p-2.5 rounded-lg text-[11px] text-slate-300">
                                            Your net payout is higher due to a performance bonus of $500, which has been processed under code BONUS_Q2.
                                        </div>
                                    </div>
                                </div>

                                <button onclick="showToast('Employee Chatbot Live Demo: Conversational payslip queries handled in milliseconds!')" class="w-full mt-2 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded border border-slate-700 text-xs font-bold transition-all">
                                    LAUNCH CHAT COMPONENT DEMO
                                </button>
                            </div>

                            <!-- Portal Screen 2: Admin Reports Dashboard -->
                            <div class="bg-slate-900 rounded-2xl border border-slate-800 p-4 flex flex-col justify-between">
                                <div class="border-b border-slate-800 pb-2 mb-3 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <span class="w-2.5 h-2.5 rounded-full bg-accent-500"></span>
                                        <span class="text-[10px] font-mono uppercase text-slate-400 font-bold">Client Admin Dashboard View</span>
                                    </div>
                                    <span class="text-[10px] text-slate-500">Insights</span>
                                </div>

                                <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 space-y-3 flex-grow my-2">
                                    <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Calculated Headcount Dynamics</p>
                                    
                                    <!-- Bar Chart representation using Tailwind -->
                                    <div class="space-y-2 mt-2">
                                        <div class="flex items-center gap-2">
                                            <span class="w-14 text-[9px] text-slate-400 font-mono">Q1 Spend</span>
                                            <div class="flex-grow bg-slate-900 h-2 rounded-full overflow-hidden">
                                                <div class="bg-indigo-500 h-full" style="width: 65%"></div>
                                            </div>
                                            <span class="text-[9px] text-slate-300 font-mono">$1.2M</span>
                                        </div>

                                        <div class="flex items-center gap-2">
                                            <span class="w-14 text-[9px] text-slate-400 font-mono">Q2 Spend</span>
                                            <div class="flex-grow bg-slate-900 h-2 rounded-full overflow-hidden">
                                                <div class="bg-indigo-500 h-full" style="width: 78%"></div>
                                            </div>
                                            <span class="text-[9px] text-slate-300 font-mono">$1.4M</span>
                                        </div>

                                        <div class="flex items-center gap-2">
                                            <span class="w-14 text-[9px] text-slate-400 font-mono">Q3 Forecast</span>
                                            <div class="flex-grow bg-slate-900 h-2 rounded-full overflow-hidden">
                                                <div class="bg-brand-500 h-full" style="width: 85%"></div>
                                            </div>
                                            <span class="text-[9px] text-brand-500 font-mono font-bold">$1.6M</span>
                                        </div>
                                    </div>
                                </div>

                                <button onclick="showToast('Query Executed: Executive payroll dashboard rendering complete.')" class="w-full mt-2 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded border border-slate-700 text-xs font-bold transition-all">
                                    RENDER REAL-TIME DATASET
                                </button>
                            </div>
                        </div>
                    </div>
                `,
                notes: `
                    <strong>Key Talking Points:</strong>
                    <ul>
                        <li>This slide gives us a mock walkthrough of two major features in the CorePay suite.</li>
                        <li>First, check the Mobile Employee App: when Sarah asks her chat agent why her pay is different, NLP technology pulls her bonus details instantly, saving HR from manual review tickets.</li>
                        <li>Second, explore the Client Admin Dashboard View: running predictive models highlights upcoming headcount dynamics and forecasts quarterly spend securely.</li>
                        <li>You can click 'Launch Chat Component Demo' or 'Render Real-Time Dataset' to show these systems in action.</li>
                    </ul>
                `
            }
        ];

        // Global State
        let currentSlideIndex = 0;

        // Custom Toast Notification System
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.innerText = message;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(20px)';
                toast.style.opacity = '0';
            }, 4000);
        }

        // Setup Slide Navigation Menu
        function initNavigationMenu() {
            const menu = document.getElementById('slideMenu');
            menu.innerHTML = '';
            presentationData.forEach((slide, index) => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-2 text-left rounded-lg transition-all text-xs font-bold whitespace-nowrap outline-none flex items-center gap-2 ${
                    index === currentSlideIndex 
                        ? 'bg-brand-500 text-slate-950 font-extrabold shadow-md shadow-brand-500/10' 
                        : 'text-slate-400 hover:text-slate-100 hover:bg-slate-800'
                }`;
                btn.onclick = () => goToSlide(index);
                btn.innerHTML = `
                    <span class="font-mono text-[9px] opacity-70">${String(index + 1).padStart(2, '0')}</span>
                    <span>${slide.menuTitle}</span>
                `;
                menu.appendChild(btn);
            });
        }

        // Render Current Slide View
        function renderCurrentSlide() {
            const viewport = document.getElementById('slidesViewport');
            const slide = presentationData[currentSlideIndex];

            // Render view containing proper transition classes
            viewport.innerHTML = `
                <div class="slide-transition opacity-0 transform scale-95 w-full h-full flex items-center justify-center" id="slideElement">
                    ${slide.html}
                </div>
            `;

            // Trigger reflow & fade-in transition
            setTimeout(() => {
                const elem = document.getElementById('slideElement');
                if (elem) {
                    elem.classList.remove('opacity-0', 'scale-95');
                    elem.classList.add('opacity-100', 'scale-100');
                }
            }, 50);

            // Set counter, navigation, and speaker notes
            document.getElementById('slideCounter').innerText = `${currentSlideIndex + 1} / ${presentationData.length}`;
            document.getElementById('prevBtn').disabled = currentSlideIndex === 0;
            document.getElementById('nextBtn').disabled = currentSlideIndex === presentationData.length - 1;

            const notesContent = document.getElementById('speakerNotesContent');
            notesContent.innerHTML = slide.notes;

            // Update Active Menu Slide button highlight
            const buttons = document.querySelectorAll('#slideMenu button');
            buttons.forEach((btn, index) => {
                if (index === currentSlideIndex) {
                    btn.className = 'px-3 py-2 text-left rounded-lg transition-all text-xs font-extrabold whitespace-nowrap outline-none flex items-center gap-2 bg-brand-500 text-slate-950 shadow-md shadow-brand-500/10';
                } else {
                    btn.className = 'px-3 py-2 text-left rounded-lg transition-all text-xs font-bold whitespace-nowrap outline-none flex items-center gap-2 text-slate-400 hover:text-slate-100 hover:bg-slate-800';
                }
            });

            // If the current slide contains our interactive ROI tool, compute its values instantly
            if (slide.id === 9) {
                setTimeout(calculateROI, 100);
            }
        }

        // Navigation Controllers
        function nextSlide() {
            if (currentSlideIndex < presentationData.length - 1) {
                currentSlideIndex++;
                renderCurrentSlide();
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderCurrentSlide();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            renderCurrentSlide();
        }

        // Keyboard Shortcut Mapping
        document.addEventListener('keydown', (e) => {
            // Guard to make sure we aren't interfering with input fields (like standard controls)
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'ArrowRight' || e.key === 'Space' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'f') {
                toggleFullscreen();
            }
        });

        // Touch Navigation Support (Swipes)
        let touchstartX = 0;
        let touchendX = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        });

        function handleGesture() {
            if (touchendX < touchstartX - 50) {
                nextSlide();
            }
            if (touchendX > touchstartX + 50) {
                prevSlide();
            }
        }

        // Toggle Fullscreen Wrapper
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    showToast(`Error entering fullscreen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Toggle Right Speaker Notes Drawer
        function toggleSpeakerNotes() {
            const drawer = document.getElementById('speakerNotesDrawer');
            drawer.classList.toggle('hidden');
        }

        // Real-Time Dynamic ROI Calculator Logic (Slide 9)
        function calculateROI() {
            const employees = parseInt(document.getElementById('paramEmployees').value);
            const time = parseInt(document.getElementById('paramTime').value);
            const loadedRate = parseInt(document.getElementById('paramCost').value);

            // Update Labels
            document.getElementById('valEmployees').innerText = `${employees.toLocaleString()} Employees`;
            document.getElementById('valTime').innerText = `${time} Days / Cycle`;
            document.getElementById('valCost').innerText = `$${loadedRate} / Hour`;

            // Core Mathematics Calculations based on Executive Summary Rules
            // FTE hours saved: 60% of original manual time (time * 8 hours/day * 60% saving)
            const cyclesPerYear = 12;
            const originalHoursPerCycle = time * 8;
            const savedHoursPerCycle = originalHoursPerCycle * 0.60;
            const savedAdminCostPerRun = savedHoursPerCycle * loadedRate;
            const annualAdminSavings = Math.round(savedAdminCostPerRun * cyclesPerYear);

            // Error Avoidance calculations: caught errors based on size mapping
            const assumedErrorsCaughtPerCycle = employees / 1000; // e.g. 1 error caught per run per 1k staff
            const assumedPenaltyOrReworkCost = 500; // standard custom parameter from summary
            const annualErrorSavings = Math.round(assumedErrorsCaughtPerCycle * assumedPenaltyOrReworkCost * cyclesPerYear);

            // Combined Outputs
            const totalAnnualSavings = annualAdminSavings + annualErrorSavings;
            
            // Assumed CorePay License Cost to calculate custom % ROI (e.g. baseline subscription + implementation overhead)
            const assumedPlatformAnnualCost = Math.round((employees * 1.5) * 12 + 7500); 
            const percentROI = Math.round((totalAnnualSavings / assumedPlatformAnnualCost) * 100);

            // Dynamic DOM injection
            document.getElementById('resultAdminSavings').innerText = `$${annualAdminSavings.toLocaleString()}`;
            document.getElementById('resultErrorSavings').innerText = `$${annualErrorSavings.toLocaleString()}`;
            document.getElementById('resultTotalSavings').innerText = `$${totalAnnualSavings.toLocaleString()} / Year`;
            document.getElementById('resultPercentROI').innerText = `${percentROI}%`;
        }

        // Build Printable Slide Elements on Print Event
        function buildPrintSlides() {
            const printCont = document.getElementById('printContainer');
            printCont.innerHTML = '';
            
            presentationData.forEach((slide, idx) => {
                const page = document.createElement('div');
                page.className = 'print-page hidden flex flex-col justify-between';
                page.innerHTML = `
                    <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-6">
                        <span class="text-xs font-mono font-bold text-slate-500">COREPAY PRESENTATION • SLIDE ${idx + 1}</span>
                        <span class="text-xs font-bold text-brand-500">CorePay AI Ecosystem</span>
                    </div>
                    <div class="flex-grow flex items-center justify-center my-8">
                        ${slide.html}
                    </div>
                    <div class="border-t border-slate-800 pt-4 mt-6">
                        <h4 class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">Speaker Reference Notes:</h4>
                        <div class="text-slate-300 text-xs leading-relaxed space-y-1">
                            ${slide.notes}
                        </div>
                    </div>
                `;
                printCont.appendChild(page);
            });
        }

        // Initialize App on Window Load
        window.onload = function() {
            initNavigationMenu();
            renderCurrentSlide();
            buildPrintSlides();
            
            // Listen for print events to refresh slides
            window.onbeforeprint = buildPrintSlides;
        }
    </script>
</body>
</html>
